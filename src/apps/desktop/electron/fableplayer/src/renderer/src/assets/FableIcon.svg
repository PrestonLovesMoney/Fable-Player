<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Fable player app icon</title>
  <desc>Іконка застосунку: біле заокруглене тло з градієнтною монограмою літери F у фіолетово-рожево-коралових тонах, як у логотипі Fable player.</desc>

  <defs>
    <linearGradient id="fgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D004E"/>
      <stop offset="55%" stop-color="#F83A75"/>
      <stop offset="100%" stop-color="#FD6860"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#FDFDFC"/>

  <g fill="url(#fgrad)">
    <rect x="176" y="140" width="72" height="240" rx="16"/>
    <rect x="176" y="140" width="160" height="64" rx="16"/>
    <rect x="176" y="228" width="120" height="64" rx="16"/>
  </g>
</svg>
